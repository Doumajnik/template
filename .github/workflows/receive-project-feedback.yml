# Receives feedback from projects built with this template.
# Claude Opus 4 (via GitHub Models) reviews the feedback, proposes improvements,
# and opens a PR with concrete edits — fully on GitHub, no external API keys.
#
# SETUP (template repo only):
# 1. Create a GitHub PAT (fine-grained) with Models read access.
# 2. Add it as a repo secret named GH_MODELS_TOKEN.
# 3. Ensure GitHub Models is enabled for your account/org.
#
# This workflow runs IN the template repo. Project repos trigger it via
# repository_dispatch from send-feedback-to-template.yml.

name: Receive Project Feedback

on:
  repository_dispatch:
    types: [project-feedback]

permissions:
  contents: write
  pull-requests: write

jobs:
  receive-and-review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout template repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Extract payload
        id: payload
        run: |
          echo "project_name=${{ github.event.client_payload.project_name }}" >> "$GITHUB_OUTPUT"
          echo "project_url=${{ github.event.client_payload.project_url }}" >> "$GITHUB_OUTPUT"
          echo "sha=${{ github.event.client_payload.sha }}" >> "$GITHUB_OUTPUT"
          echo "timestamp=${{ github.event.client_payload.timestamp }}" >> "$GITHUB_OUTPUT"

      - name: Save raw feedback
        id: feedback
        run: |
          mkdir -p feedback

          project_safe=$(echo "${{ steps.payload.outputs.project_name }}" | tr '/' '_')
          date_str=$(date -u +%Y-%m-%d)
          filename="feedback/${date_str}_${project_safe}.md"

          cat > "$filename" << EOF
          # Feedback from ${{ steps.payload.outputs.project_name }}

          - **Source:** ${{ steps.payload.outputs.project_url }}
          - **Commit:** \`${{ steps.payload.outputs.sha }}\`
          - **Received:** ${{ steps.payload.outputs.timestamp }}

          ---

          EOF

          echo '${{ github.event.client_payload.feedback }}' | jq -r '.' >> "$filename"

          echo "filename=${filename}" >> "$GITHUB_OUTPUT"
          echo "project_safe=${project_safe}" >> "$GITHUB_OUTPUT"

      - name: Collect current template files
        id: context
        run: |
          context_file=$(mktemp)

          for file in \
            AGENTS.md \
            .github/copilot-instructions.md \
            docs/PLAYBOOK.md \
            docs/CODE_INVENTORY.md \
            docs/BUSINESS_LOGIC.md \
            .ai/PREFERENCES.md \
            .ai/lessons.md; do
            if [ -f "$file" ]; then
              echo "=== FILE: $file ===" >> "$context_file"
              cat "$file" >> "$context_file"
              echo -e "\n\n" >> "$context_file"
            fi
          done

          for file in .github/agents/*.agent.md; do
            if [ -f "$file" ]; then
              echo "=== FILE: $file ===" >> "$context_file"
              cat "$file" >> "$context_file"
              echo -e "\n\n" >> "$context_file"
            fi
          done

          echo "context_file=${context_file}" >> "$GITHUB_OUTPUT"

      - name: Claude Opus 4 via GitHub Models — review and propose improvements
        id: claude
        env:
          GH_MODELS_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
        run: |
          template_context=$(cat "${{ steps.context.outputs.context_file }}")
          feedback_content=$(cat "${{ steps.feedback.outputs.filename }}")

          # Build the request for GitHub Models (OpenAI-compatible API)
          prompt=$(jq -n \
            --arg ctx "$template_context" \
            --arg fb "$feedback_content" \
            '{
              "model": "anthropic/claude-opus-4",
              "max_tokens": 16000,
              "temperature": 0,
              "messages": [
                {
                  "role": "system",
                  "content": "You are a senior engineering consultant reviewing field feedback from projects that use an agentic AI project template. You analyze retrospectives, lessons learned, playbook updates, and quality/security reports to identify improvements that should be applied back to the template.\n\nRules:\n- Only propose GENERAL improvements that benefit all projects — never project-specific changes.\n- Never remove existing working rules — only refine, add, or clarify.\n- Keep the same formatting style as existing files.\n- Be conservative — only propose changes you are confident improve the template.\n- If nothing actionable is found, say so explicitly.\n\nOutput format — return ONLY a JSON array of edits, no other text:\n```json\n[\n  {\n    \"file\": \"relative/path/to/file.md\",\n    \"action\": \"append | replace\",\n    \"search\": \"exact text to find (only for replace action)\",\n    \"content\": \"new content to append or replace with\",\n    \"reasoning\": \"why this change improves the template\"\n  }\n]\n```\n\nIf no changes are warranted, return:\n```json\n[]\n```"
                },
                {
                  "role": "user",
                  "content": ("--- CURRENT TEMPLATE FILES ---\n" + $ctx + "\n\n--- FEEDBACK FROM PROJECT ---\n" + $fb)
                }
              ]
            }')

          # Call GitHub Models API
          response=$(curl -s -w "\n%{http_code}" \
            "https://models.inference.ai.azure.com/chat/completions" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${GH_MODELS_TOKEN}" \
            -d "$prompt")

          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | sed '$d')

          if [ "$http_code" != "200" ]; then
            echo "::error::GitHub Models API returned HTTP $http_code"
            echo "$body" | jq '.' 2>/dev/null || echo "$body"
            exit 1
          fi

          # Extract content from OpenAI-compatible response
          claude_output=$(echo "$body" | jq -r '.choices[0].message.content')
          echo "$claude_output" > /tmp/claude_review.txt

          # Extract JSON edits (between ```json and ```)
          edits_json=$(echo "$claude_output" | sed -n '/^```json$/,/^```$/p' | sed '1d;$d')

          if [ -z "$edits_json" ]; then
            edits_json="$claude_output"
          fi

          echo "$edits_json" > /tmp/edits.json

          if ! jq '.' /tmp/edits.json > /dev/null 2>&1; then
            echo "::warning::Claude output was not valid JSON. Saving raw review only."
            echo "has_edits=false" >> "$GITHUB_OUTPUT"
          else
            edit_count=$(jq 'length' /tmp/edits.json)
            echo "Claude proposed ${edit_count} edit(s)."
            echo "has_edits=true" >> "$GITHUB_OUTPUT"
            echo "edit_count=${edit_count}" >> "$GITHUB_OUTPUT"
          fi

      - name: Apply Claude's proposed edits
        if: steps.claude.outputs.has_edits == 'true' && steps.claude.outputs.edit_count != '0'
        run: |
          edit_count=$(jq 'length' /tmp/edits.json)

          for i in $(seq 0 $(( edit_count - 1 ))); do
            file=$(jq -r ".[$i].file" /tmp/edits.json)
            action=$(jq -r ".[$i].action" /tmp/edits.json)
            content=$(jq -r ".[$i].content" /tmp/edits.json)
            reasoning=$(jq -r ".[$i].reasoning" /tmp/edits.json)

            echo "--- Edit $((i+1)): $action on $file ---"
            echo "Reason: $reasoning"

            # Safety: only allow edits to known template files
            case "$file" in
              AGENTS.md|.github/copilot-instructions.md|docs/*.md|.ai/*.md|.github/agents/*.agent.md)
                ;;
              *)
                echo "::warning::Skipping edit to unexpected file: $file"
                continue
                ;;
            esac

            if [ ! -f "$file" ] && [ "$action" = "replace" ]; then
              echo "::warning::File $file does not exist, skipping replace."
              continue
            fi

            if [ "$action" = "append" ]; then
              mkdir -p "$(dirname "$file")"
              printf "\n%s" "$content" >> "$file"
              echo "Appended to $file"

            elif [ "$action" = "replace" ]; then
              search=$(jq -r ".[$i].search" /tmp/edits.json)

              if grep -qF "$search" "$file"; then
                python3 - "$i" << 'PYEOF'
import json, sys

idx = int(sys.argv[1])
with open('/tmp/edits.json') as f:
    edits = json.load(f)

edit = edits[idx]
filepath = edit['file']
search_text = edit['search']
replacement = edit['content']

with open(filepath, 'r') as f:
    text = f.read()

text = text.replace(search_text, replacement, 1)

with open(filepath, 'w') as f:
    f.write(text)

print(f"Replaced text in {filepath}")
PYEOF
              else
                echo "::warning::Search text not found in $file, skipping."
              fi
            fi
          done

      - name: Save Claude's full review
        run: |
          mkdir -p feedback
          cp /tmp/claude_review.txt "feedback/${{ steps.feedback.outputs.project_safe }}_claude_review.md"

      - name: Build PR body
        run: |
          {
            echo "## Automated Feedback Review"
            echo ""
            echo "**Project:** ${{ steps.payload.outputs.project_url }}"
            echo "**Commit:** \`${{ steps.payload.outputs.sha }}\`"
            echo "**Received:** ${{ steps.payload.outputs.timestamp }}"
            echo "**Reviewed by:** Claude Opus 4 (GitHub Models)"
            echo ""

            if [ "${{ steps.claude.outputs.has_edits }}" = "true" ] && [ "${{ steps.claude.outputs.edit_count }}" != "0" ]; then
              echo "### Claude proposed ${{ steps.claude.outputs.edit_count }} improvement(s)"
              echo ""
              echo "The proposed changes have been applied to the template files in this PR."
              echo "Review each change carefully before merging."
              echo ""

              edit_count=$(jq 'length' /tmp/edits.json)
              for i in $(seq 0 $(( edit_count - 1 ))); do
                file=$(jq -r ".[$i].file" /tmp/edits.json)
                action=$(jq -r ".[$i].action" /tmp/edits.json)
                reasoning=$(jq -r ".[$i].reasoning" /tmp/edits.json)
                echo "- **\`$file\`** ($action): $reasoning"
              done
            else
              echo "### No actionable improvements found"
              echo ""
              echo "Claude reviewed the feedback and determined no template changes are warranted."
              echo "The raw feedback is still saved in \`feedback/\` for reference."
            fi

            echo ""
            echo "---"
            echo "*See \`feedback/\` for the raw feedback and Claude's full review.*"
          } > /tmp/pr_body.md

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "feedback: AI-reviewed improvements from ${{ steps.payload.outputs.project_name }}"
          branch: "feedback/${{ steps.feedback.outputs.project_safe }}-${{ github.run_id }}"
          title: "[AI Review] Feedback from ${{ steps.payload.outputs.project_name }}"
          body-path: /tmp/pr_body.md
          labels: feedback,template-improvement,ai-reviewed
          delete-branch: true
