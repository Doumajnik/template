  test:
    name: Test (${{ matrix.lang }})
    runs-on: ubuntu-latest
    needs: [lint]
    strategy:
      fail-fast: false
      matrix:
        # TODO: Configure for your project — keep only the languages you use
        include:
          - lang: python
            version: '3.11'
          - lang: python
            version: '3.12'
          # - lang: node
          #   version: '18'
          # - lang: node
          #   version: '20'
    steps:
      - uses: actions/checkout@v4

      # --- Python ---
      - if: matrix.lang == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.version }}
          cache: pip
      - if: matrix.lang == 'python'
        run: |
          python -m pip install --upgrade pip
          # TODO: Configure for your project — install your dependencies
          pip install -e ".[dev]" || pip install -r requirements-dev.txt || true
      - if: matrix.lang == 'python'
        run: |
          # TODO: Configure for your project — adjust test command
          python -m pytest tests/ --tb=short -q --cov=src --cov-report=xml

      # --- Node ---
      - if: matrix.lang == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.version }}
          cache: npm
      - if: matrix.lang == 'node'
        run: npm ci
      - if: matrix.lang == 'node'
        run: |
          # TODO: Configure for your project — adjust test command
          npm test -- --coverage

